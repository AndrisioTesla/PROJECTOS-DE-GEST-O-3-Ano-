<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<nav class="navbar">
    <a href="/"> Home</a>
    <a href="/dashboard"> Dashboard</a>
    <a href="/history"> Histórico</a>
</nav>

<div class="container">

    <h1> Dashboard IA</h1>

    <!-- CARDS -->
    <div class="grid">

        <div class="stat-card">
            <h3>Fake News</h3>
            <div class="stat-number">{{ fake }}</div>
        </div>

        <div class="stat-card">
            <h3>Notícias Verdadeiras</h3>
            <div class="stat-number">{{ real }}</div>
        </div>

    </div>

    <!-- GRÁFICO -->
    <div class="card">
        <h2> Distribuição de Notícias</h2>
        <canvas id="chart"></canvas>
    </div>

</div>

<script>
const fake = Number("{{ fake | default(0) }}");
const real = Number("{{ real | default(0) }}");
new Chart(document.getElementById("chart"), {
    type: "doughnut",
    data: {
        labels: ["Fake News", "Verdadeiras"],
        datasets: [{
            data: [fake, real],
            backgroundColor: ["#ef4444", "#22c55e"]
        }]
    }
});
</script>

</body>
</html>
